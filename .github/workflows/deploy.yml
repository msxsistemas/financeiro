name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: 'frontend/package-lock.json' }
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint -- --max-warnings 9999 || true
      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          command_timeout: 15m
          script: |
            set -e
            cd /var/www/financeiro

            echo "=== git pull ==="
            git fetch --all
            git reset --hard origin/main

            echo "=== aplicar migrations pendentes ==="
            for f in backend/src/migrations/*.sql; do
              name=$(basename "$f")
              echo "-- $name"
              docker exec -i financeiro_postgres psql -U financeiro_user -d financeiro < "$f" || true
            done

            echo "=== backend deps ==="
            cd backend
            mkdir -p logs
            npm ci --omit=dev --silent || npm install --omit=dev --silent

            echo "=== restart API ==="
            npx pm2 delete financeiro-api >/dev/null 2>&1 || true
            npx pm2 start ecosystem.config.cjs
            npx pm2 save
            cd ..

            echo "=== frontend build ==="
            cd frontend
            npm ci --silent || npm install --silent
            npm run build

            echo "=== DEPLOY OK ==="
