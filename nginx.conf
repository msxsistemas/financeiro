# Frontend - financeiro.msxsystem.site
server {
    listen 80;
    server_name financeiro.msxsystem.site;

    root /var/www/financeiro/frontend/dist;
    index index.html;

    # index.html NUNCA pode ser cacheado — senão os users ficam presos
    # na versão antiga mesmo com hash novo nos assets.
    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    # Service worker: sempre verificar atualização
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    # Assets hasheados do Vite (ex: /assets/index-abc123.js) — 1 ano, immutable
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Ícones e fontes — cacheia mas sem immutable
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Fallback SPA: qualquer outra rota devolve index.html (sem cache, ver regra acima)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Backend API - apifinanceiro.msxsystem.site
server {
    listen 80;
    server_name apifinanceiro.msxsystem.site;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }
}
